<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chapter 54 · LGBTQ Health</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #61487b, #453257);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        .container {
            width: 100vw;
            height: 100vh;
            background: #f5eefc;
            display: flex;
            flex-direction: column;
            box-shadow: 0 15px 40px rgba(80, 50, 100, 0.5);
        }

        .header {
            background: linear-gradient(135deg, #8a6bb5, #674993);
            color: white;
            padding: 20px 30px;
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 90px;
            border-bottom: 5px solid #dcc2ff;
            box-shadow: 0 8px 15px #402e58;
        }

        .header-content {
            flex: 1;
        }

        .header h1 {
            font-size: 1.9rem;
            margin: 0;
            font-weight: 600;
            letter-spacing: 0.2px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header h1::before {
            content: "🏳️‍🌈";
            font-size: 2.3rem;
            filter: drop-shadow(0 0 4px #e3d0ff);
        }

        .subtitle {
            font-size: 1rem;
            opacity: 0.9;
            margin-top: 5px;
            font-weight: 400;
        }

        .counter {
            background: #614882;
            padding: 10px 28px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1.3rem;
            min-width: 110px;
            text-align: center;
            backdrop-filter: blur(3px);
            border: 2px solid #decaff;
            color: #faf2ff;
        }

        .progress-container {
            width: 100%;
            height: 10px;
            background: #dfd0f5;
            flex-shrink: 0;
        }

        .progress-bar {
            background: linear-gradient(90deg, #ad8be0, #7e5fb7);
            height: 100%;
            width: 0%;
            transition: width 0.4s ease;
            box-shadow: 0 0 12px #b797f0;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: 30px;
            background: #efe3fd;
        }

        .question-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            background: white;
            border-radius: 32px;
            padding: 35px;
            box-shadow: 0 20px 40px rgba(120, 70, 160, 0.2);
            border: 2px solid #dabfff;
            overflow-y: auto;
            margin-bottom: 20px;
        }

        .question-header {
            display: flex;
            gap: 25px;
            align-items: flex-start;
            margin-bottom: 30px;
        }

        .question-number {
            background: linear-gradient(145deg, #9573c9, #6f4fa5);
            color: white;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.9rem;
            font-weight: 800;
            flex-shrink: 0;
            border: 3px solid #e1c9ff;
            box-shadow: 0 7px 0 #4e3775;
        }

        .question-text {
            font-size: 1.4rem;
            line-height: 1.6;
            color: #4c3570;
            flex-grow: 1;
            font-weight: 600;
            padding-right: 15px;
        }

        .options-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        .option {
            padding: 20px 22px;
            border: 3px solid #ead7ff;
            border-radius: 22px;
            cursor: pointer;
            transition: all 0.25s ease;
            background: #ffffff;
            display: flex;
            align-items: center;
            gap: 20px;
            font-size: 1.15rem;
            box-shadow: 0 5px 12px rgba(110, 60, 140, 0.08);
        }

        .option:hover {
            background: #f8f0ff;
            border-color: #b392ec;
            transform: translateY(-3px);
            box-shadow: 0 18px 25px rgba(140, 80, 190, 0.15);
        }

        .option-letter {
            background: linear-gradient(145deg, #8d6bc0, #684a98);
            color: white;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            flex-shrink: 0;
            font-size: 1.3rem;
            border: 2px solid #e5cfff;
        }

        .option.correct {
            background: linear-gradient(145deg, #c6e6d4, #b2dec6);
            border-color: #2b7a56;
            color: #1b4f32;
        }
        .option.correct .option-letter {
            background: #1f7a51;
            border-color: #b7f0d4;
        }

        .option.incorrect {
            background: linear-gradient(145deg, #fad7d2, #fecbc3);
            border-color: #b14242;
            color: #631e1e;
        }
        .option.incorrect .option-letter {
            background: #b84545;
            border-color: #f5b7b7;
        }

        .feedback-area {
            flex-shrink: 0;
        }

        .feedback {
            padding: 25px;
            border-radius: 20px;
            display: none;
            align-items: center;
            gap: 20px;
            font-weight: 700;
            font-size: 1.25rem;
            animation: slideIn 0.3s ease;
            margin-bottom: 20px;
        }

        .feedback.correct {
            background: linear-gradient(145deg, #daf0da, #c8e6c8);
            border: 3px solid #2e7d5a;
            color: #1b4d2b;
            display: flex;
        }

        .feedback.incorrect {
            background: linear-gradient(145deg, #ffdedb, #fecbc7);
            border: 3px solid #bb3b3b;
            color: #632020;
            display: flex;
        }

        .feedback-icon {
            font-size: 2rem;
        }

        .rationale {
            background: linear-gradient(145deg, #f2e9ff, #eadcfe);
            border: 3px solid #8f6dc2;
            border-radius: 20px;
            padding: 25px;
            display: none;
            animation: slideIn 0.3s ease;
        }
        .rationale.show {
            display: block;
        }
        .rationale h4 {
            color: #704fa3;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.3rem;
        }
        .rationale p {
            color: #492f70;
            line-height: 1.7;
            font-size: 1.1rem;
        }

        .navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 35px;
            background: #e1cefc;
            border-top: 3px solid #cdb2f2;
            flex-shrink: 0;
            height: 85px;
        }

        .nav-buttons {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .btn {
            padding: 16px 42px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.1rem;
            white-space: nowrap;
            box-shadow: 0 6px 0 #594186;
        }

        .btn-primary {
            background: linear-gradient(145deg, #8f6dc1, #694b99);
            color: white;
            border: 2px solid #e4ceff;
        }
        .btn-primary:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 0 #403064, 0 8px 20px #9677cb;
        }
        .btn-secondary {
            background: linear-gradient(145deg, #7d63a8, #5d4682);
            color: white;
            border: 2px solid #e2d0fc;
        }
        .btn-secondary:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 0 #3b2e57, 0 8px 20px #846cb4;
        }
        .btn-cancel {
            background: linear-gradient(145deg, #c27f7f, #aa4a4a);
            color: white;
            display: none;
            border: 2px solid #f3baba;
        }
        .btn-cancel:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 0 #632d2d;
        }
        .btn-cancel.show {
            display: flex;
        }

        .btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: 0 4px 0 #51407a;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 700px) {
            .question-text { font-size: 1.2rem; }
            .option { font-size: 1rem; padding: 15px; }
        }
    </style>
</head>

</div>

    // ----- identical navigation/selection logic as template -----
    let currentQuestion = 0;
    let selectedOption = null;
    let answers = Array(questions.length).fill(null);

    function loadQuestion() {
        const q = questions[currentQuestion];
        if (!q) return;

        const progress = ((currentQuestion + 1) / questions.length) * 100;
        document.getElementById('progressBar').style.width = `${progress}%`;
        document.getElementById('counter').textContent = `${currentQuestion + 1}/${questions.length}`;
        document.getElementById('questionNumber').textContent = q.id;

        document.getElementById('question').innerHTML = q.question;
        loadOptions(q);

        document.getElementById('feedback').style.display = 'none';
        document.getElementById('rationale').classList.remove('show');
        document.getElementById('cancelBtn').classList.remove('show');

        document.getElementById('prevBtn').disabled = currentQuestion === 0;
        const stored = answers[currentQuestion];
        document.getElementById('nextBtn').disabled = stored === null || stored === undefined;
        document.getElementById('nextBtn').textContent = currentQuestion >= questions.length - 1 ? 'FINISH ➡️' : 'NEXT ➡️';
    }

    function loadOptions(q) {
        const container = document.getElementById('options');
        container.innerHTML = '';
        q.options.forEach((opt, idx) => {
            const div = document.createElement('div');
            div.className = 'option';
            div.innerHTML = `<div class="option-letter">${String.fromCharCode(65 + idx)}</div><div>${opt}</div>`;
            div.onclick = () => selectOption(idx);
            container.appendChild(div);
        });

        const saved = answers[currentQuestion];
        if (saved !== null && saved !== undefined) {
            selectOption(saved, true);
        }
    }

    function selectOption(index, fromMemory = false) {
        const q = questions[currentQuestion];
        if (!fromMemory && selectedOption !== null) return;

        if (!fromMemory) {
            selectedOption = index;
            answers[currentQuestion] = index;
        }

        highlightSelected(index, q);
        showFeedback(index, q);
        document.getElementById('nextBtn').disabled = false;
        document.getElementById('cancelBtn').classList.add('show');
    }

    function highlightSelected(index, q) {
        const opts = document.querySelectorAll('.option');
        opts.forEach((opt, i) => opt.classList.remove('correct', 'incorrect'));

        const correctIndices = Array.isArray(q.correct) ? q.correct : [q.correct];
        if (Array.isArray(q.correct)) {
            correctIndices.forEach(ci => opts[ci]?.classList.add('correct'));
            if (!correctIndices.includes(index)) {
                opts[index]?.classList.add('incorrect');
            }
        } else {
            if (index === q.correct) {
                opts[index].classList.add('correct');
            } else {
                opts[index].classList.add('incorrect');
                opts[q.correct].classList.add('correct');
            }
        }
    }

    function showFeedback(index, q) {
        const fb = document.getElementById('feedback');
        const icon = document.getElementById('feedbackIcon');
        const text = document.getElementById('feedbackText');
        const rationaleDiv = document.getElementById('rationale');
        const rationaleP = document.getElementById('rationaleText');

        const correctIndices = Array.isArray(q.correct) ? q.correct : [q.correct];
        const isCorrect = correctIndices.includes(index);

        if (isCorrect) {
            fb.className = 'feedback correct';
            icon.textContent = '✅';
            text.textContent = 'CORRECT!';
        } else {
            fb.className = 'feedback incorrect';
            icon.textContent = '❌';
            const letters = correctIndices.map(c => String.fromCharCode(65 + c)).join(', ');
            text.textContent = `INCORRECT. Correct answer(s): ${letters}`;
        }

        fb.style.display = 'flex';
        rationaleP.innerHTML = q.rationale;
        rationaleDiv.classList.add('show');
    }

    function cancelSelection() {
        const q = questions[currentQuestion];
        selectedOption = null;
        answers[currentQuestion] = null;
        document.querySelectorAll('.option').forEach(opt => opt.classList.remove('correct', 'incorrect'));
        document.getElementById('feedback').style.display = 'none';
        document.getElementById('rationale').classList.remove('show');
        document.getElementById('cancelBtn').classList.remove('show');
        document.getElementById('nextBtn').disabled = true;
    }

    function nextCard() {
        if (currentQuestion < questions.length - 1) {
            currentQuestion++;
            selectedOption = null;
            loadQuestion();
        } else {
            currentQuestion = 0;
            loadQuestion();
        }
    }

    function previousCard() {
        if (currentQuestion > 0) {
            currentQuestion--;
            const q = questions[currentQuestion];
            selectedOption = answers[currentQuestion];
            loadQuestion();
        }
    }

    document.addEventListener('keydown', function(e) {
        if (e.key >= '1' && e.key <= '4') selectOption(parseInt(e.key)-1);
        else if (e.key >= 'a' && e.key <= 'd') selectOption(e.key.charCodeAt(0)-97);
        else if (e.key >= 'A' && e.key <= 'D') selectOption(e.key.charCodeAt(0)-65);
        else if (e.key === 'ArrowLeft' && !document.getElementById('prevBtn').disabled) previousCard();
        else if (e.key === 'ArrowRight' && !document.getElementById('nextBtn').disabled) nextCard();
        else if (e.key === 'Escape' && document.getElementById('cancelBtn').classList.contains('show')) cancelSelection();
    });

    loadQuestion();
</script>
</body>
</html>
